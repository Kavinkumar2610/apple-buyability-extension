<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Apple Availability</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1c1c1e;
      color: #f5f5f7;
      padding: 12px;
      user-select: none;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 10px; border-bottom: 1px solid #2c2c2e; margin-bottom: 10px;
    }
    .apple-icon {
      width: 32px; height: 32px; background: #2c2c2e; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .header-text h1 { font-size: 13px; font-weight: 600; margin: 0; }
    .header-text p { font-size: 11px; color: #8e8e93; margin-top: 2px; }
    .product { margin-bottom: 10px; }
    .product-title { font-size: 12px; font-weight: 600; padding-bottom: 6px; border-bottom: 1px solid #2c2c2e; margin-bottom: 8px; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 0; }
    .card { background: #2c2c2e; border-radius: 12px; padding: 10px 12px; }
    .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: #8e8e93; margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; line-height: 1; }
    .card-value.yes     { color: #30d158; }
    .card-value.no      { color: #ff453a; }
    .card-value.unknown { color: #636366; }
    .card-hint { font-size: 10px; color: #636366; margin-top: 5px; }
    .error-banner {
      background: #2c1515; border: 1px solid #6b2020; border-radius: 8px;
      padding: 9px 11px; font-size: 12px; color: #ff6b6b; margin-bottom: 12px; word-break: break-word;
    }
    .footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid #2c2c2e; }
    .meta { display: flex; flex-direction: column; gap: 3px; }
    .meta-text { font-size: 11px; color: #636366; }
    .btn-refresh {
      background: #0a84ff; color: #fff; border: none; border-radius: 7px;
      padding: 6px 14px; font-size: 12px; font-weight: 500; cursor: pointer;
      font-family: inherit; transition: background 0.15s;
    }
    .btn-refresh:hover:not(:disabled) { background: #0071e3; }
    .btn-refresh:disabled { background: #3a3a3c; color: #5a5a5e; cursor: default; }
    .settings { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2c2c2e; }
    .settings-label { font-size: 11px; color: #8e8e93; }
    .toggle { position: relative; display: inline-flex; align-items: center; width: 36px; height: 20px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track { position: absolute; inset: 0; background: #3a3a3c; border-radius: 10px; transition: background 0.2s; }
    .toggle input:checked + .toggle-track { background: #30d158; }
    .toggle-thumb { position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s; pointer-events: none; }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }
    .interval-select { margin-left: auto; background: #2c2c2e; color: #f5f5f7; border: none; border-radius: 6px; font-size: 11px; padding: 4px 8px; font-family: inherit; cursor: pointer; }
    .interval-select:disabled { color: #636366; cursor: default; }
    .spinner {
      display: inline-block; width: 10px; height: 10px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 5px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <a href="https://www.apple.com/my" target="_blank"><img src="icons/apple-logo.png" alt="Apple" class="apple-icon"></a>
    <div class="header-text">
      <h1>MacBook Availability</h1>
      <p>MY-EDU Store &nbsp;&middot;&nbsp; Apple The Exchange TRX</p>
    </div>
  </div>
  <div id="error-banner" class="error-banner" style="display:none;"></div>
  <div id="products-container"></div>
  <div class="footer">
    <div class="meta">
      <span class="meta-text" id="last-checked">Never checked</span>
      <span class="meta-text" id="next-check"></span>
    </div>
    <button class="btn-refresh" id="btn-refresh">Refresh</button>
  </div>
  <div class="settings">
    <span class="settings-label">Auto-refresh</span>
    <label class="toggle">
      <input type="checkbox" id="toggle-auto-refresh">
      <span class="toggle-track"></span>
      <span class="toggle-thumb"></span>
    </label>
    <select id="interval-select" class="interval-select">
      <option value="5">5 min</option>
      <option value="10">10 min</option>
      <option value="15">15 min</option>
      <option value="30">30 min</option>
      <option value="60">1 hr</option>
    </select>
  </div>
  <script src="popup.js"></script>
</body>
</html>
